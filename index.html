<!DOCTYPE html>
<html lang="ja">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Apps</title>

<style>

body{
    margin:0;
    font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
    background:#f5f5f5;
}

/* ヒーロー */

.hero{
    background: linear-gradient(135deg,#0c0a0a,#7b5e57);
    color:white;
    text-align:center;
    padding:80px 20px;
}

.hero h1{
    font-size:42px;
    margin-bottom:10px;
}

.hero p{
    font-size:18px;
    opacity:0.9;
}

/* コンテンツ */

.container{
    max-width:900px;
    margin:auto;
    padding:40px 20px;
}

/* アプリカード */

.card{
    background:white;
    padding:24px;
    border-radius:14px;
    margin-bottom:24px;
    box-shadow:0 6px 18px rgba(0,0,0,0.08);
}

.card h2{
    margin-top:0;
}

/* ボタン */

.button{
    display:inline-block;
    margin-top:10px;
    padding:10px 18px;
    background:#6b4f4f;
    color:white;
    border-radius:8px;
    text-decoration:none;
}

.button:hover{
    background:#5a3f3f;
}

/* フッター */

footer{
    text-align:center;
    padding:30px;
    color:#666;
}

</style>

</head>

<body>

<section class="hero">
<h1>For Espresso Lovers</h1>
<p>Coffee tools for better brewing</p>
</section>


<div class="container">

<div class="card">
<h2>Make Crema</h2>
<p>エスプレッソ抽出を記録するアプリ</p>

<a class="button" href="/apps/espresso/">App Page</a>
</div>

<div class="card">
<h2>Privacy Policy</h2>
<p>プライバシーポリシー</p>

<a class="button" href="/apps/espresso/privacy.html">View</a>
</div>

</div>

<footer>
© 2026.3
</footer>

</body>
</html>
